e party, with many members unhappy with Spahn's communication about his personal life and concerns that it damaged the credibility of the CDU. The move is seen as a positive development for the party ahead of state elections and the upcoming coalition, which had been under strain due to Spahn's actions.", "meta": "Tagesschau Alle Meldungen · 18 July 2026, 20:21", "url": "https://www.tagesschau.de/inland/innenpolitik/spahn-ruecktritt-108.html"}, {"title": "Artificial Intelligence: Expulse AI bands from real musicians?", "summary": "A Christian rock band called Shunned at a Funeral has gained 250,000 subscribers on YouTube despite being entirely created by artificial intelligence, raising questions about the role of human creativity in music production. Some experts argue that if an AI-generated band's concept is conceived by a human, the audience will appreciate the results as art, while others believe that using AI to create music is not yet a creative act. A label has even been established for AI artists, with some producers seeing AI as a tool to realize artistic ideas and not necessarily replace human musicians.", "meta": "Tagesschau Alle Meldungen · 18 July 2026, 20:02", "url": "https://www.tagesschau.de/kultur/kuenstliche-intelligenz-musik-bands-100.html"}, {"title": "Reactions to the resignation of Jens Spahn as President of the Union Group", "summary": "Jens Spahn, President of the Union Group, has resigned after facing criticism and scandals, with some parties hailing it as a long-overdue move, while others accuse him of double standards. CDU leaders Friedrich Merz and Markus Söder praised Spahn's decision, while CSU leader Markus Söder acknowledged it was a personal choice. The opposition, including the Greens, Left, and FDP, condemned Spahn's leadership, with some labeling his resignation as a \"further moral low point of the CDU\".", "meta": "Tagesschau Alle Meldungen · 18 July 2026, 19:56", "url": "https://www.tagesschau.de/inland/innenpolitik/reaktionen y international law, sea blockades are allowed during war but must be announced in advance and only affect specific ports, not entire straits. The use of force against ships trying to break through the blockade may also be permitted, but the blockade itself does not appear to violate international law.", "meta": "Tagesschau Alle Meldungen · 18 July 2026, 05:10", "url": "https://www.tagesschau.de/ausland/asien/iran-blockade-maut-angriffe-recht-100.html"}, {"title": "How the power struggle in NRW puts pressure on the AfD", "summary": "A power struggle within the AfD's North Rhine-Westphalia (NRW) faction, led by Martin Vincentz and Matthias Helferich, has escalated into chaos, with insults, threats, and even physical altercations between party members. The dispute threatens to block the AfD's admission to the state parliament election in NRW, which could have significant implications for the party's national prospects. The situation is further complicated by a blockade tactic employed by Helferich's camp, which has slowed down the voting process at the party's congress.", "meta": "Tagesschau Alle Meldungen · 17 July 2026, 22:07", "url": "https://www.tagesschau.de/inland/innenpolitik/afd-nrw-streit-100.html"}, {"title": "Union leader Spahn defends surrogacy against criticism", "summary": "Union leader Jens Spahn has defended his decision to have a child via a surrogate mother in the US, citing \"no easy decisions\" and stating that he had been \"torn apart\" by the issue for a long time. His party, the CDU, opposes surrogacy legalization in Germany, but Spahn himself had previously publicly refused it. The controversy has led to demands for his resignation from within his own party.", "meta": "Tagesschau Alle Meldungen · 17 July 2026, 22:01", "url": "https://www.tagesschau.de/inland/spahn-cdu-leihmutterschaft-reaktionen-100.html"}, {"title": "Franco-German Summit: More cooperation in armaments", "summary": "German Chancellor Friedrich Merz and French President Emmanuel Macron announced plans for expanded military cooperation between their countries, including participation in nuclear exercises and development of joint defense projects such as the Combat Cloud system. The agreement aims to improve European security and create uncertainty among adversaries, with France financing its own nuclear armament. Despite a partial failure in their joint fighter jet project, Merz and Macron emphasized the importance of Franco-German cooperation for Europe's future.", "meta": "Tagesschau Alle Meldungen · 17 July 2026, 18:10", "url": "https://www.tagesschau.de/ausland/europa/deutschland-frankreich-gipfel-bruehl-100.html"}, {"title": "Israel's Parliament Dissolves - Campaign Begins", "summary": "Israel's Parliament has been dissolved after its legislative term ended without early elections for the first time in nearly 40 years, marking the beginning of a campaign to elect a new government. Prime Minister Benjamin Netanyahu is fighting for another term, with the election campaign centered around the contentious issue of compulsory military service for ultra-orthodox Jews. Critics warn that these laws and others passed by the outgoing parliament threaten Israel's democracy and could lead to widespread protests during the upcoming election campaign.", "meta": "Tagesschau Alle Meldungen · 17 July 2026, 17:12", "url": "https://www.tagesschau.de/ausland/asien/knesset-israel-106.html"}, {"title": "New Labour boss Andy Burnham: his recipe is regionalization", "summary": "Andy Burnham, the new Labour leader, plans to strengthen regional powers and give more money and responsibility to local administrations in the UK, aiming to boost economic growth beyond London. He proposes decentralizing power, including moving parts of the administration to Manchester, and promoting self-responsibility for local politicians. This vision is seen as a departure from the traditional centralized model in the UK, where power is concentrated in London.", "meta": "Tagesschau Alle Meldungen · 17 July 2026, 16:59", "url": "https://www.tagesschau.de/ausland/europa/andy-burnham-portraet-100.html"}, {"title": "Shared reactions to EU proposal on emissions trading", "summary": "The EU Commission has proposed reforms to its emissions trading system (ETS) aimed at relieving industry from pressure while increasing funding for decarbonization efforts. Critics argue that the current system favors member states over companies, with only 10% of ETS profits going towards reducing CO2 emissions. The proposal includes extending the ETS period and reducing costs for energy-intensive industries to encourage more climate investment.", "meta": "Tagesschau Alle Meldungen · 17 July 2026, 16:57", "url": "https://www.tagesschau.de/wirtschaft/unternehmen/emissionshandel-klimaschutz-102.html"}, {"title": "Russia: War enemy Nadezhdin sentenced to fine", "summary": "A Russian court has sentenced opposition politician Boris Nadezhdin to a fine for displaying \"extremist symbols\" on social media, which featured a picture of Alexei Navalny, a prominent critic of the Kremlin who died in prison. The sentence is seen as an attempt by authorities to silence Nadezhdin ahead of parliamentary elections, where he had planned to run and speak out against Russia's war in Ukraine. Nadezhdin was also denied permission to participate in the election due to his past candidacy against Vladimir Putin.", "meta": "Tagesschau Alle Meldungen · 17 July 2026, 15:50", "url": "https://www.tagesschau.de/ausland/europa/russland-kremlkritiker-nadeschdin-geldstrafe-100.html"}];
    const perPage = 10;
    let currentPage = 1;
    const totalPages = Math.max(1, Math.ceil(articles.length / perPage));

    const container = document.getElementById("articles");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageInfo = document.getElementById("pageInfo");

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str == null ? "" : str;
      return div.innerHTML;
    }

    function render() {
      const start = (currentPage - 1) * perPage;
      const pageItems = articles.slice(start, start + perPage);

      container.innerHTML = pageItems.map(function (a) {
        const title = escapeHtml(a.title || "Untitled");
        const summary = a.summary
          ? escapeHtml(a.summary)
          : "<em>No summary available.</em>";
        const meta = escapeHtml(a.meta || "");
        const url = escapeHtml(a.url || "#");
        return (
          '<article class="card">' +
            '<h2 class="card-title">' + title + '</h2>' +
            '<div class="card-meta">' + meta + '</div>' +
            '<p class="card-summary">' + summary + '</p>' +
            '<a class="card-link" href="' + url + '" target="_blank" rel="noopener">Read original →</a>' +
          '</article>'
        );
      }).join("");

      pageInfo.textContent = "Page " + currentPage + " of " + totalPages;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
      window.scrollTo(0, 0);
    }

    prevBtn.addEventListener("click", function () {
      if (currentPage > 1) { currentPage--; render(); }
    });
    nextBtn.addEventListener("click", function () {
      if (currentPage < totalPages) { currentPage++; render(); }
    });

    render();
  </script>
